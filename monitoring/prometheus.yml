global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'fastapi'
    scrape_interval: 5s
    metrics_path: '/metrics'
    scheme: https
    static_configs:
      - targets: ['api-132t.onrender.com']
